<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa ❤️</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#login{
text-align:center;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.heart{
position:absolute;
color:red;
font-size:22px;
transition:transform 2s ease;
}

#player{
position:absolute;
width:1px;
height:1px;
left:-9999px;
}

</style>
</head>

<body>

<div id="login">
<h2>🔐 Ingresa el código</h2>
<input type="password" id="code">
<br>
<button onclick="checkCode()">Entrar</button>
</div>

<!-- Video oculto -->
<iframe id="player"
src=""
allow="autoplay">
</iframe>

<script>

function checkCode(){

let correct="143";
let input=document.getElementById("code").value;

if(input===correct){

document.getElementById("login").style.display="none";

document.getElementById("player").src =
"https://www.youtube.com/embed/ntdwWKaGaPQ?autoplay=1&loop=1&playlist=ntdwWKaGaPQ";

createHeart();

}else{

alert("Código incorrecto 💔");

}

}

function createHeart(){

const hearts=[];
const total=120;

for(let i=0;i<total;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

let t=Math.PI*2*(i/total);

let x=16*Math.pow(Math.sin(t),3);
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

heart.style.left=(window.innerWidth/2+x*15)+"px";
heart.style.top=(window.innerHeight/2-y*15)+"px";

document.body.appendChild(heart);

hearts.push(heart);

}

setTimeout(()=>{

hearts.forEach(h=>{

let dx=(Math.random()-0.5)*900;
let dy=(Math.random()-0.5)*900;

h.style.transform=`translate(${dx}px,${dy}px)`;

});

},4000);

}

</script>

</body>
</html>
