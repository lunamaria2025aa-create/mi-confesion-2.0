<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Algo que quiero decirte</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* texto inicial */

#text{
position:absolute;
font-size:28px;
opacity:0;
transition:1.5s;
}

/* estrellas */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
0%{opacity:0.2}
100%{opacity:1}
}

/* luna */

#moon{
position:absolute;
top:60px;
right:80px;
width:120px;
height:120px;
background:#f5f3ce;
border-radius:50%;
box-shadow:0 0 40px #fff9c4;
opacity:0;
transition:2s;
}

/* corazón */

#heart{
font-size:120px;
opacity:0;
position:absolute;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.25)}
100%{transform:scale(1)}
}

/* nombre final */

#name{
position:absolute;
top:65%;
font-size:45px;
letter-spacing:6px;
opacity:0;
}

/* partículas corazón */

.particle{
position:absolute;
font-size:20px;
animation:explode 2s forwards;
}

@keyframes explode{
0%{transform:translate(0,0);opacity:1}
100%{transform:translate(var(--x),var(--y));opacity:0}
}

/* reproductor oculto */

#player{
position:absolute;
left:-9999px;
}

</style>
</head>

<body>

<div id="text"></div>
<div id="moon"></div>
<div id="heart">❤️</div>
<div id="name"></div>
<div id="player"></div>

<script>

/* crear estrellas */

for(let i=0;i<120;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
document.body.appendChild(s)
}

/* API YouTube */

var tag=document.createElement('script')
tag.src="https://youtu.be/QESagb08FYs?si=hhPyU5bB2AGPaJQS"
document.head.appendChild(tag)

var player

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
height:'1',
width:'1',
videoId:'ApXoWvfEYVU',
playerVars:{
'autoplay':0,
'controls':0,
'loop':1,
'playlist':'ApXoWvfEYVU'
}
})
}

/* historia */

function startStory(){

player.playVideo()
player.unMute()

let text=document.getElementById("text")

/* paso 1 */

text.innerHTML="A veces todo parece oscuro..."
text.style.opacity=1

/* paso 2 */

setTimeout(()=>{
text.innerHTML="Pero incluso en la oscuridad..."
},3000)

/* estrellas */

setTimeout(()=>{
document.querySelectorAll(".star").forEach(s=>{
s.style.opacity=1
})
},4000)

/* luna */

setTimeout(()=>{
text.innerHTML="siempre hay algo que brilla."
document.getElementById("moon").style.opacity=1
},7000)

/* corazón */

setTimeout(()=>{
text.innerHTML="Y para mí..."
let h=document.getElementById("heart")
h.style.opacity=1
},10000)

/* explosión */

setTimeout(()=>{
explodeHeart()
},13000)

}

/* explosión corazón */

function explodeHeart(){

let heart=document.getElementById("heart")
heart.style.display="none"

for(let i=0;i<40;i++){

let p=document.createElement("div")
p.className="particle"
p.innerHTML="💖"

let x=(Math.random()*600-300)+"px"
let y=(Math.random()*400-200)+"px"

p.style.setProperty("--x",x)
p.style.setProperty("--y",y)

p.style.left="50%"
p.style.top="50%"

document.body.appendChild(p)

}

/* nombre final */

setTimeout(()=>{
showName()
},1200)

}

/* escribir nombre */

function showName(){

let name="MITSUAYA"
let i=0
let box=document.getElementById("name")

box.style.opacity=1

let interval=setInterval(()=>{

box.innerHTML+=name[i]
i++

if(i>=name.length){
clearInterval(interval)
}

},200)

}

/* empezar historia con click */

document.body.addEventListener("click",startStory,{once:true})

</script>

</body>
</html>
