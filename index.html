<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
background:radial-gradient(circle at top,#1b2a6b,#000000);
}

/* estrellas */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.9;
animation:twinkle 2s infinite alternate;
z-index:0;
}

@keyframes twinkle{
0%{opacity:0.2; transform:scale(1);}
100%{opacity:1; transform:scale(1.3);}
}

/* luna */

#moon{
position:absolute;
top:40px;
right:60px;
width:120px;
height:120px;
background:#f5f3ce;
border-radius:50%;
box-shadow:0 0 40px #fff9c4;
z-index:1;
}

/* login */

#login{
text-align:center;
z-index:2;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

/* corazón */

#bigHeart{
font-size:130px;
display:none;
animation:beat 1s infinite;
position:absolute;
z-index:2;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.25);}
100%{transform:scale(1);}
}

/* mensaje */

#message{
display:none;
position:absolute;
top:65%;
font-size:42px;
letter-spacing:6px;
z-index:2;
}

#player{
position:absolute;
left:-9999px;
width:1px;
height:1px;
}

</style>
</head>

<body>

<div id="moon"></div>

<div id="login">
<h2>🔐 Ingresa el código</h2>
<input id="code" type="password">
<br>
<button onclick="enterCode()">Entrar</button>
</div>

<div id="bigHeart">❤️</div>
<div id="message"></div>

<div id="player"></div>

<script>

/* crear estrellas */

for(let i=0;i<150;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.animationDuration=(Math.random()*3+1)+"s";
document.body.appendChild(star);
}

/* cargar API YouTube */

var tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

var player;

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
height:'1',
width:'1',
videoId:'ApXoWvfEYVU',
playerVars:{
'autoplay':0,
'controls':0,
'loop':1,
'playlist':'ApXoWvfEYVU'
}
});
}

/* escribir nombre */

function escribirNombre(){
let nombre="MITSUAYA";
let i=0;

let interval=setInterval(()=>{
document.getElementById("message").innerHTML+=nombre[i];
i++;
if(i>=nombre.length){
clearInterval(interval);
}
},200);
}

/* ENTER */

document.getElementById("code").addEventListener("keypress",function(e){
if(e.key==="Enter"){
enterCode();
}
});

function enterCode(){

let code=document.getElementById("code").value.trim();

if(code==="143"){

document.getElementById("login").style.display="none";

player.playVideo();
player.unMute();

document.getElementById("bigHeart").style.display="block";

setTimeout(()=>{
document.getElementById("message").style.display="block";
escribirNombre();
},2000);

}else{
alert("Código incorrecto 💔");
}

}

</script>

</body>
</html>
