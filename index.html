```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa</title>

<style>

body{
margin:0;
background:linear-gradient(black,#1a001a);
overflow:hidden;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#login{
text-align:center;
z-index:10;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff4d6d;
color:white;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

.floatHeart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

#bigHeart{
position:absolute;
font-size:120px;
display:none;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

#message{
position:absolute;
top:55%;
font-size:40px;
display:none;
letter-spacing:5px;
}

#player{
position:absolute;
left:-9999px;
width:1px;
height:1px;
}

</style>
</head>
