<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tengo algo que decirte</title>

<style>

body{
margin:0;
height:100vh;
font-family:Arial;
background:linear-gradient(#0b1230,#1a2b5c);
color:white;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* estrellas */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
animation:blink 2s infinite;
}

@keyframes blink{
0%,100%{opacity:0.2}
50%{opacity:1}
}

/* estrella fugaz */

.shooting-star{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 2s linear;
}

@keyframes shoot{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(-400px,200px);opacity:0;}
}

/* luna */

.moon{
position:absolute;
top:60px;
right:80px;
width:120px;
height:120px;
background:#f5f3c3;
border-radius:50%;
box-shadow:0 0 40px #fff;
display:flex;
align-items:center;
justify-content:center;
color:#333;
font-weight:bold;
font-size:20px;
}

/* caja */

.box{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:20px;
text-align:center;
width:420px;
backdrop-filter:blur(6px);
}

/* conejito */

.bunny{
position:relative;
width:100px;
height:100px;
background:white;
border-radius:50%;
margin:auto;
}

.ear{
position:absolute;
width:30px;
height:80px;
background:white;
border-radius:50px;
top:-60px;
}

.ear.left{left:10px}
.ear.right{right:10px}

.eye{
position:absolute;
width:8px;
height:8px;
background:black;
border-radius:50%;
top:40px;
}

.eye.left{left:25px}
.eye.right{right:25px}

.nose{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
top:55px;
left:47px;
}

.bow{
position:absolute;
top:-30px;
left:35px;
}

.bow:before,.bow:after{
content:"";
position:absolute;
width:15px;
height:15px;
background:#7ecbff;
border-radius:50%;
}

.bow:after{left:15px}

/* botones */

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#ff7ec4;
color:white;
cursor:pointer;
margin-top:10px;
}

input{
padding:8px;
border-radius:8px;
border:none;
margin-top:10px;
}

#ac1,#ac2,#ac3,#sobre,#carta,#pregunta,#final{
display:none;
}

/* carta */

#sobre{
font-size:70px;
cursor:pointer;
}

/* corazones flotantes */

.heart{
position:absolute;
color:#ff4fa3;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

.bigheart{
font-size:120px;
animation:pop 1s;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="moon" id="moon">🌙</div>

<div class="box">

<div class="bunny">
<div class="ear left"></div>
<div class="ear right"></div>
<div class="bow"></div>
<div class="eye left" id="eye1"></div>
<div class="eye right" id="eye2"></div>
<div class="nose"></div>
</div>

<div id="inicio">
<h2>Debo decirte algo…</h2>
<p>pero primero resuelve esto.</p>
<button onclick="start()">Empezar</button>
</div>

<div id="ac1">
<p>No soy canción pero suenas en mi mente. ¿Qué eres?</p>
<input id="r1">
<br>
<button onclick="check1()">Responder</button>
</div>

<div id="ac2">
<p>No soy magia pero alegras mi día. ¿Qué haces?</p>
<input id="r2">
<br>
<button onclick="check2()">Responder</button>
</div>

<div id="ac3">
<p>Empieza con A y es lo que siento.</p>
<input id="r3">
<br>
<button onclick="check3()">Responder</button>
</div>

<div id="sobre" onclick="abrirCarta()">💌</div>

<div id="carta">
<h1 id="texto"></h1>
</div>

<div id="pregunta">
<h2>¿Quieres ser la aya de mi Mitsuki?</h2>
<button onclick="si()">SÍ</button>
<button id="no" onmouseover="escapar()">NO</button>
</div>

<div id="final"></div>

</div>

<!-- música -->
<iframe id="music" width="0" height="0" src="" allow="autoplay"></iframe>

<script>

/* estrellas */

for(let i=0;i<60;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
document.body.appendChild(s)
}

/* estrella fugaz */

function estrellaFugaz(){
let star=document.createElement("div")
star.className="shooting-star"
star.style.top=Math.random()*200+"px"
star.style.left=window.innerWidth+"px"
document.body.appendChild(star)
setTimeout(()=>{star.remove()},2000)
}

setInterval(estrellaFugaz,8000)

/* parpadeo conejo */

function parpadear(){
eye1.style.height="2px"
eye2.style.height="2px"
setTimeout(()=>{
eye1.style.height="8px"
eye2.style.height="8px"
},200)
}

setInterval(parpadear,3000)

/* empezar */

function start(){

document.getElementById("music").src=
"https://www.youtube.com/embed/6uQy1qgXq9Q?autoplay=1&loop=1&playlist=6uQy1qgXq9Q"

inicio.style.display="none"
ac1.style.display="block"

moon.innerHTML="🌙"

}

/* acertijos */

function check1(){
if(r1.value.toLowerCase().includes("tu")){
ac1.style.display="none"
ac2.style.display="block"
moon.innerHTML="🌓"
}
}

function check2(){
ac2.style.display="none"
ac3.style.display="block"
moon.innerHTML="🌕"
}

function check3(){
if(r3.value.toLowerCase().includes("amor")){
ac3.style.display="none"
sobre.style.display="block"
}
}

/* carta */

function abrirCarta(){

sobre.style.display="none"
carta.style.display="block"

let msg="me gustas"
let i=0

function escribir(){
if(i<msg.length){
texto.innerHTML+=msg[i]
i++
setTimeout(escribir,150)
}else{
setTimeout(()=>{
carta.style.display="none"
pregunta.style.display="block"
},1500)
}
}

escribir()

}

/* botón no escapa */

function escapar(){

let b=document.getElementById("no")

b.style.position="absolute"
b.style.left=Math.random()*80+"%"
b.style.top=Math.random()*80+"%"

}

/* fuegos artificiales */

function firework(){

for(let i=0;i<20;i++){

let f=document.createElement("div")
f.innerHTML="✨"
f.style.position="absolute"

f.style.left=(window.innerWidth/2)+"px"
f.style.top=(window.innerHeight/2)+"px"

let x=(Math.random()-0.5)*400
let y=(Math.random()-0.5)*400

f.style.transform=`translate(${x}px,${y}px)`
f.style.fontSize="20px"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},1000)

}

}

/* corazón gigante */

function corazonGigante(){

let centerX = window.innerWidth/2
let centerY = window.innerHeight/2

for(let t=0; t<Math.PI*2; t+=0.1){

let x = 16*Math.pow(Math.sin(t),3)
let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))

let s=document.createElement("div")
s.innerHTML="✨"
s.style.position="absolute"

s.style.left=centerX+x*15+"px"
s.style.top=centerY+y*15+"px"

document.body.appendChild(s)

setTimeout(()=>{s.remove()},3000)

}

}

/* final */

function si(){

pregunta.style.display="none"

moon.innerHTML="MANI"

for(let i=0;i<5;i++){
setTimeout(firework,i*600)
}

setTimeout(corazonGigante,2000)

for(let i=0;i<20;i++){
setTimeout(()=>{
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"vw"
document.body.appendChild(h)
},i*200)
}

setTimeout(()=>{
final.innerHTML="<div class='bigheart'>❤️</div><p>🐰💗 Gracias por jugar conmigo</p>"
final.style.display="block"
},4000)

}

</script>

</body>
</html>
