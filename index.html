```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa</title>

<style>

body{
margin:0;
background:linear-gradient(black,#1a001a);
overflow:hidden;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#login{
text-align:center;
z-index:10;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff4d6d;
color:white;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

.floatHeart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

#bigHeart{
position:absolute;
font-size:120px;
display:none;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

#message{
position:absolute;
top:60%;
font-size:40px;
display:none;
letter-spacing:5px;
}

#player{
position:absolute;
left:-9999px;
width:1px;
height:1px;
}

</style>
</head>

<body>

<div id="login">
<h2>🔐 Ingresa el código</h2>
<input type="password" id="code">
<br>
<button onclick="enter()">Entrar</button>
</div>

<div id="bigHeart">❤️</div>
<div id="message">MITSUAYA</div>

<iframe id="player" allow="autoplay"></iframe>

<script>

/* ESTRELLAS */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.body.appendChild(star);
}

/* CORAZONES FLOTANDO */

setInterval(()=>{
let h=document.createElement("div");
h.className="floatHeart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},6000);

},800);

/* FUNCION DEL CODIGO */

function enter(){

let code=document.getElementById("code").value.trim();

if(code==="143"){

document.getElementById("login").style.display="none";

document.getElementById("player").src=
"https://www.youtube.com/embed/ntdwWKaGaPQ?autoplay=1&loop=1&playlist=ntdwWKaGaPQ";

let heart=document.getElementById("bigHeart");
let msg=document.getElementById("message");

heart.style.display="block";

setTimeout(()=>{
msg.style.display="block";
},2000);

setTimeout(()=>{
heart.style.transform="scale(3)";
},6000);

}else{

alert("Código incorrecto 💔");

}

}

</script>

</body>
</html>
