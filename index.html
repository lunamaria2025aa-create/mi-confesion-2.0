<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hay algo que quiero decirte...</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(#020024,#090979,#000000);
color:white;
overflow:hidden;
text-align:center;
}

/* estrellas */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.8;
animation:parpadeo 2s infinite alternate;
}

@keyframes parpadeo{
from{opacity:0.2;}
to{opacity:1;}
}

/* estrella fugaz */

.shooting{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 4s linear infinite;
}

@keyframes shoot{
0%{
transform:translate(-200px,-200px);
opacity:1;
}
100%{
transform:translate(800px,600px);
opacity:0;
}
}

/* caja */

.box{
background:rgba(0,0,0,0.5);
padding:35px;
border-radius:20px;
backdrop-filter:blur(6px);
max-width:600px;
}

/* botones */

button{
padding:12px 22px;
border:none;
border-radius:25px;
margin:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.si{
background:#ff4d88;
color:white;
}

.no{
background:#666;
color:white;
position:relative;
}

/* ocultar */

.hidden{
display:none;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c6f4b.mp3">
</audio>

<div class="box">

<div id="inicio">
<h2>Hola...</h2>
<p>Hay algo que quiero decirte.</p>
<button onclick="empezar()">Empezar</button>
</div>

<div id="mensaje" class="hidden">
<h2 id="texto"></h2>
<button onclick="siguiente()">Continuar</button>
</div>

<div id="pregunta" class="hidden">

<h2>La verdad es que...</h2>
<p>me gustas mucho.</p>

<p>¿Te gustaría intentar algo conmigo?</p>

<button class="si" onclick="si()">Sí 💖</button>
<button class="no" id="no">No</button>

</div>

<div id="final" class="hidden">

<h2>✨ Sabía que eras especial ✨</h2>

<p>
Prometo que intentaré hacerte sonreír  
cada vez que pueda.
</p>

<p>💫</p>

</div>

</div>

<script>

/* estrellas */

for(let i=0;i<120;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
star.style.animationDuration=(Math.random()*3+1)+"s"
document.body.appendChild(star)
}

/* estrella fugaz */

setInterval(()=>{
let s=document.createElement("div")
s.className="shooting"
s.style.left=Math.random()*100+"vw"
s.style.top="0px"
document.body.appendChild(s)

setTimeout(()=>{s.remove()},4000)

},3000)

/* empezar */

function empezar(){

document.getElementById("inicio").classList.add("hidden")
document.getElementById("mensaje").classList.remove("hidden")

document.getElementById("music").play()

let texto="Desde hace tiempo quería decirte algo..."
let i=0

function escribir(){

if(i<texto.length){

document.getElementById("texto").innerHTML+=texto.charAt(i)
i++

setTimeout(escribir,50)

}

}

escribir()

}

/* siguiente */

function siguiente(){

document.getElementById("mensaje").classList.add("hidden")
document.getElementById("pregunta").classList.remove("hidden")

}

/* si */

function si(){

document.getElementById("pregunta").classList.add("hidden")
document.getElementById("final").classList.remove("hidden")

}

/* boton no escapa */

let botonNo=document.getElementById("no")

botonNo.addEventListener("mouseover",()=>{

let x=Math.random()*300-150
let y=Math.random()*200-100

botonNo.style.transform=`translate(${x}px,${y}px)`

})

</script>

</body>
</html>
