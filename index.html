<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#login{
text-align:center;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

#bigHeart{
font-size:120px;
display:none;
animation:beat 1s infinite;
position:absolute;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

#message{
display:none;
position:absolute;
top:65%;
font-size:40px;
letter-spacing:5px;
}

#player{
position:absolute;
left:-9999px;
width:1px;
height:1px;
}

</style>

</head>

<body>

<div id="login">
<h2>🔐 Ingresa el código</h2>
<input id="code" type="password">
<br>
<button onclick="enterCode()">Entrar</button>
</div>

<div id="bigHeart">❤️</div>
<div id="message">MITSUAYA</div>

<div id="player"></div>

<script>

/* cargar API youtube */

var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

var player;

function onYouTubeIframeAPIReady(){

player = new YT.Player('player', {
height:'1',
width:'1',
videoId:'s_Ia7RT_v9Q',
playerVars:{
'autoplay':0,
'controls':0,
'loop':1,
'playlist':'s_Ia7RT_v9Q',
'modestbranding':1
}
});

}

/* permitir ENTER */

document.getElementById("code").addEventListener("keypress",function(e){
if(e.key==="Enter"){
enterCode();
}
});

function enterCode(){

let code=document.getElementById("code").value.trim();

if(code==="143"){

document.getElementById("login").style.display="none";

player.playVideo();

document.getElementById("bigHeart").style.display="block";

setTimeout(()=>{
document.getElementById("message").style.display="block";
},2000);

}else{

alert("Código incorrecto 💔");

}

}

</script>

</body>
</html>
