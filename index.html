<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corazón de Corazones</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    transition:transform 1s ease;
}
</style>
</head>

<body>

<!-- Música -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/9aofoBrFNdg?autoplay=1&loop=1&playlist=9aofoBrFNdg"
frameborder="0" allow="autoplay"></iframe>

<script>

const hearts = [];
const total = 120;

for(let i=0;i<total;i++){

    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";

    let t = Math.PI * 2 * (i/total);

    let x = 16*Math.pow(Math.sin(t),3);
    let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

    heart.style.left = (window.innerWidth/2 + x*15)+"px";
    heart.style.top = (window.innerHeight/2 - y*15)+"px";

    document.body.appendChild(heart);
    hearts.push(heart);
}

// explosión después de 3 segundos
setTimeout(()=>{

    hearts.forEach(h=>{
        let dx = (Math.random()-0.5)*800;
        let dy = (Math.random()-0.5)*800;
        h.style.transform = `translate(${dx}px,${dy}px) scale(0.5)`;
    });

},3000);

</script>

</body>
</html>
