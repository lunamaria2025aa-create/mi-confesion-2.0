<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorpresa</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#login{
text-align:center;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
}

#bigHeart{
font-size:120px;
display:none;
animation:beat 1s infinite;
position:absolute;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

#message{
display:none;
position:absolute;
top:65%;
font-size:40px;
letter-spacing:5px;
}

#player{
position:absolute;
left:-9999px;
width:1px;
height:1px;
}

</style>

</head>

<body>

<div id="login">
<h2>🔐 Ingresa el código</h2>
<input id="code" type="password" placeholder="Código">
<br>
<button onclick="enterCode()">Entrar</button>
</div>

<div id="bigHeart">❤️</div>
<div id="message">MITSUAYA</div>

<iframe id="player" allow="autoplay"></iframe>

<script>

/* estrellas */

for(let i=0;i<80;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.body.appendChild(star);
}

/* permitir presionar ENTER */

document.getElementById("code").addEventListener("keypress",function(e){
if(e.key==="Enter"){
enterCode();
}
});

function enterCode(){

let code=document.getElementById("code").value.trim();

if(code==="143"){

document.getElementById("login").style.display="none";

document.getElementById("player").src=
"https://www.youtube.com/embed/ntdwWKaGaPQ?autoplay=1&loop=1&playlist=ntdwWKaGaPQ";

document.getElementById("bigHeart").style.display="block";

setTimeout(()=>{
document.getElementById("message").style.display="block";
},2000);

}else{

alert("Código incorrecto 💔");

}

}

</script>

</body>
</html>
